edition = "2023";
package common.v1;

import "buf/validate/validate.proto";
import "common/v1/filter_schema.proto";

option go_package = "github.com/pug-sh/pug/internal/gen/proto/common/v1;commonv1";

enum FilterOperator {
  FILTER_OPERATOR_UNSPECIFIED = 0;
  FILTER_OPERATOR_EQUALS = 1;
  FILTER_OPERATOR_NOT_EQUALS = 2;
  FILTER_OPERATOR_CONTAINS = 3;
  FILTER_OPERATOR_NOT_CONTAINS = 4;
  FILTER_OPERATOR_IS_SET = 5;
  FILTER_OPERATOR_IS_NOT_SET = 6;
  FILTER_OPERATOR_LTE = 7;
  FILTER_OPERATOR_GTE = 8;
  FILTER_OPERATOR_LT = 9;
  FILTER_OPERATOR_GT = 10;
  FILTER_OPERATOR_IN = 11;
  FILTER_OPERATOR_NOT_IN = 12;
  FILTER_OPERATOR_BETWEEN = 13;
  FILTER_OPERATOR_NOT_BETWEEN = 14;
}

message PropertyFilter {
  option (buf.validate.message).cel = {
    id: "property_filter.value_required"
    message: "value is required for this operator"
    expression:
      "this.operator == common.v1.FilterOperator.FILTER_OPERATOR_IS_SET"
      "|| this.operator == common.v1.FilterOperator.FILTER_OPERATOR_IS_NOT_SET"
      "|| this.operator == common.v1.FilterOperator.FILTER_OPERATOR_IN"
      "|| this.operator == common.v1.FilterOperator.FILTER_OPERATOR_NOT_IN"
      "|| this.operator == common.v1.FilterOperator.FILTER_OPERATOR_BETWEEN"
      "|| this.operator == common.v1.FilterOperator.FILTER_OPERATOR_NOT_BETWEEN"
      "|| this.value != ''"
  };
  option (buf.validate.message).cel = {
    id: "property_filter.numeric_value_required"
    message: "value/values must contain valid numbers for lte/gte/lt/gt/between/not_between operators"
    expression:
      "!(this.operator == common.v1.FilterOperator.FILTER_OPERATOR_LTE"
      "|| this.operator == common.v1.FilterOperator.FILTER_OPERATOR_GTE"
      "|| this.operator == common.v1.FilterOperator.FILTER_OPERATOR_LT"
      "|| this.operator == common.v1.FilterOperator.FILTER_OPERATOR_GT"
      "|| this.operator == common.v1.FilterOperator.FILTER_OPERATOR_BETWEEN"
      "|| this.operator == common.v1.FilterOperator.FILTER_OPERATOR_NOT_BETWEEN)"
      "|| ((this.operator == common.v1.FilterOperator.FILTER_OPERATOR_LTE"
      "|| this.operator == common.v1.FilterOperator.FILTER_OPERATOR_GTE"
      "|| this.operator == common.v1.FilterOperator.FILTER_OPERATOR_LT"
      "|| this.operator == common.v1.FilterOperator.FILTER_OPERATOR_GT)"
      "&& double(this.value) == double(this.value))"
      "|| ((this.operator == common.v1.FilterOperator.FILTER_OPERATOR_BETWEEN"
      "|| this.operator == common.v1.FilterOperator.FILTER_OPERATOR_NOT_BETWEEN)"
      "&& this.values.size() >= 2 && double(this.values[0]) == double(this.values[0]) && double(this.values[1]) == double(this.values[1]))"
  };
  option (buf.validate.message).cel = {
    id: "property_filter.values_required"
    message: "values must not be empty for in/not_in/between/not_between operators"
    expression:
      "!(this.operator == common.v1.FilterOperator.FILTER_OPERATOR_IN"
      "|| this.operator == common.v1.FilterOperator.FILTER_OPERATOR_NOT_IN"
      "|| this.operator == common.v1.FilterOperator.FILTER_OPERATOR_BETWEEN"
      "|| this.operator == common.v1.FilterOperator.FILTER_OPERATOR_NOT_BETWEEN)"
      "|| this.values.size() > 0"
  };
  option (buf.validate.message).cel = {
    id: "property_filter.values_not_allowed"
    message: "values must be empty for this operator"
    expression:
      "(this.operator == common.v1.FilterOperator.FILTER_OPERATOR_IN"
      "|| this.operator == common.v1.FilterOperator.FILTER_OPERATOR_NOT_IN"
      "|| this.operator == common.v1.FilterOperator.FILTER_OPERATOR_BETWEEN"
      "|| this.operator == common.v1.FilterOperator.FILTER_OPERATOR_NOT_BETWEEN)"
      "|| this.values.size() == 0"
  };
  option (buf.validate.message).cel = {
    id: "property_filter.between_requires_two_values"
    message: "between/not_between operators require exactly 2 values"
    expression:
      "!(this.operator == common.v1.FilterOperator.FILTER_OPERATOR_BETWEEN"
      "|| this.operator == common.v1.FilterOperator.FILTER_OPERATOR_NOT_BETWEEN)"
      "|| this.values.size() == 2"
  };
  option (buf.validate.message).cel = {
    id: "property_filter.value_not_allowed_for_set_operators"
    message: "value must be empty for is_set/is_not_set operators"
    expression:
      "!(this.operator == common.v1.FilterOperator.FILTER_OPERATOR_IS_SET"
      "|| this.operator == common.v1.FilterOperator.FILTER_OPERATOR_IS_NOT_SET)"
      "|| this.value == ''"
  };
  option (buf.validate.message).cel = {
    id: "property_filter.between_ordered_values"
    message: "between/not_between requires values[0] <= values[1]"
    // Relies on `numeric_value_required` running first for non-numeric input:
    // `double(str)` raises a CEL runtime error (not NaN) on non-numeric strings,
    // so a self-equality NaN guard would be dead code here.
    expression:
      "!(this.operator == common.v1.FilterOperator.FILTER_OPERATOR_BETWEEN"
      "|| this.operator == common.v1.FilterOperator.FILTER_OPERATOR_NOT_BETWEEN)"
      "|| this.values.size() < 2"
      "|| double(this.values[0]) <= double(this.values[1])"
  };
  string property = 1 [(buf.validate.field) = {
    required: true
    // Dots split into nested JSON subcolumn segments at the SQL layer
    // (properties.`a`.`b`). Empty segments would produce malformed CH
    // identifiers (`properties.`.``), so require non-empty segments between
    // dots, no leading or trailing dot.
    string: {pattern: "^\\$?[a-zA-Z0-9_-]+(\\.[a-zA-Z0-9_-]+)*$"}
  }];
  FilterOperator operator = 2 [(buf.validate.field) = {
    required: true
    enum: {defined_only: true, not_in: [0]}
  }];
  string value = 3;
  repeated string values = 4;
  PropertySource source = 5 [(buf.validate.field).enum.defined_only = true];
}

// EventFilter selects events by kind with optional per-event property filters.
// Used across activity feeds, event explorer, and insights queries.
message EventFilter {
  string kind = 1 [(buf.validate.field).string = {pattern: "^[a-zA-Z0-9_.-]*$"}];
  repeated PropertyFilter filters = 2;
}

// LogicalOperator defines how conditions are combined.
// Defaults to AND when unspecified.
enum LogicalOperator {
  LOGICAL_OPERATOR_UNSPECIFIED = 0;
  LOGICAL_OPERATOR_AND = 1;
  LOGICAL_OPERATOR_OR = 2;
}
